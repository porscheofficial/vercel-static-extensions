name: Release

# Publishing to npm uses npm's Trusted Publishers (OIDC) — no NPM_TOKEN secret.
# Setup (one-time, on npmjs.com):
#   Package settings → Publishing access → Trusted Publisher → GitHub Actions
#     Organization:        porscheofficial
#     Repository:          vercel-static-extensions
#     Workflow filename:   release.yml
#     Environment name:    (leave blank, unless you add `environment:` below)
#
# Requirements (already satisfied by this workflow):
#   - permissions: id-token: write   (required for OIDC)
#   - npm CLI >= 11.5.1              (ensured via `npm install -g npm@latest`)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver or 'patch'/'minor'/'major')"
        required: true
        default: "patch"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # npm Trusted Publishing requires npm >= 11.5.1.
      # Node 20 ships with npm 10.x, so we upgrade explicitly.
      - name: Upgrade npm (required for Trusted Publishing / OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        run: npm version ${{ github.event.inputs.version }}

      - name: Publish to NPM (Trusted Publisher / OIDC)
        run: npm publish --provenance --access public

      - name: Push Git Tag
        run: git push --follow-tags
